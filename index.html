<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario Platformer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(to bottom, #5c94fc 0%, #85b5ff 100%);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            touch-action: none;
        }
        #gameContainer {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        canvas {
            border: 4px solid #000;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            image-rendering: pixelated;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px;
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
            z-index: 10;
        }
        .ui-item { display: flex; flex-direction: column; align-items: center; }
        .ui-label { font-size: 12px; opacity: 0.8; }
        .ui-value { font-size: 24px; color: #ffcc00; }
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: rgba(0,0,0,0.8);
            z-index: 20;
        }
        #startScreen h1 {
            font-size: 48px; color: #e52521;
            text-shadow: 3px 3px 0 #fff, 6px 6px 0 #000;
            margin-bottom: 20px;
            letter-spacing: 3px;
        }
        #startScreen p { color: #fff; margin-bottom: 30px; text-align: center; line-height: 1.6; }
        button {
            background: linear-gradient(to bottom, #e52521 0%, #b81c19 100%);
            border: 3px solid #fff;
            color: #fff;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 5px 0 #8b0000;
            transition: transform 0.1s;
        }
        button:hover { transform: translateY(-2px); }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #8b0000; }
        .hidden { display: none !important; }
        #mobileControls {
            display: none;
            position: absolute;
            bottom: 20px;
            width: 100%;
            justify-content: space-between;
            padding: 0 40px;
        }
        .dpad, .actions { display: flex; gap: 10px; }
        .mbtn {
            width: 60px; height: 60px;
            background: rgba(255,255,255,0.3);
            border: 2px solid #fff;
            border-radius: 50%;
            color: #fff;
            font-size: 24px;
            display: flex; align-items: center; justify-content: center;
        }
        @media (max-width: 800px) {
            #mobileControls { display: flex; }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="ui">
            <div class="ui-item"><span class="ui-label">SCORE</span><span class="ui-value" id="score">0000</span></div>
            <div class="ui-item"><span class="ui-label">COINS</span><span class="ui-value" id="coins">00</span></div>
            <div class="ui-item"><span class="ui-label">WORLD</span><span class="ui-value" id="world">1-1</span></div>
            <div class="ui-item"><span class="ui-label">LIVES</span><span class="ui-value" id="lives">3</span></div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="startScreen">
            <h1>SUPER MARIO</h1>
            <p>Arrow Keys / WASD to Move<br>Space / W to Jump<br>Collect coins, stomp enemies, reach the flag!</p>
            <button onclick="startGame()">START GAME</button>
        </div>
        <div id="gameOverScreen" class="hidden">
            <h1 style="color:#ff4444">GAME OVER</h1>
            <p style="margin:20px 0">Final Score: <span id="finalScore" style="color:#ffcc00">0</span></p>
            <button onclick="startGame()">TRY AGAIN</button>
        </div>
        <div id="mobileControls">
            <div class="dpad">
                <button class="mbtn" ontouchstart="keys.left=true" ontouchend="keys.left=false">◀</button>
                <button class="mbtn" ontouchstart="keys.right=true" ontouchend="keys.right=false">▶</button>
            </div>
            <div class="actions">
                <button class="mbtn" ontouchstart="keys.jump=true" ontouchend="keys.jump=false">A</button>
            </div>
        </div>
    </div>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 800; canvas.height = 450;

// Game state
let gameState = 'start', score = 0, coins = 0, lives = 3, world = '1-1';
let cameraX = 0, gravity = 0.5, friction = 0.8;
let keys = {left:false, right:false, jump:false};
let particles = [];

// Mario
const mario = {
    x: 100, y: 300, width: 32, height: 32,
    vx: 0, vy: 0, speed: 5, jumpForce: -12,
    grounded: false, facing: 1, big: false, invincible: false, invincibleTimer: 0
};

// Level data - platforms, enemies, coins, blocks
const levelLength = 3000;
const platforms = [];
const enemies = [];
const coinObjects = [];
const blocks = [];
let flagX = 2800;

// Generate level
function generateLevel() {
    platforms.length = 0; enemies.length = 0; coinObjects.length = 0; blocks.length = 0;
    
    // Ground
    for(let i = 0; i < levelLength; i += 40) {
        if(i < 600 || i > 700) platforms.push({x: i, y: 400, width: 40, height: 50, type: 'ground'});
    }
    
    // Platforms and blocks
    const platformData = [
        {x: 300, y: 300, w: 120, h: 20}, {x: 500, y: 220, w: 80, h: 20},
        {x: 700, y: 300, w: 100, h: 20}, {x: 900, y: 200, w: 150, h: 20},
        {x: 1100, y: 280, w: 80, h: 20}, {x: 1300, y: 180, w: 100, h: 20},
        {x: 1500, y: 260, w: 120, h: 20}, {x: 1700, y: 320, w: 80, h: 20},
        {x: 1900, y: 240, w: 100, h: 20}, {x: 2100, y: 160, w: 120, h: 20},
        {x: 2400, y: 280, w: 150, h: 20}
    ];
    platformData.forEach(p => platforms.push({x: p.x, y: p.y, width: p.w, height: p.h, type: 'brick'}));
    
    // Question blocks
    const qBlocks = [400, 800, 1200, 1600, 2000, 2500];
    qBlocks.forEach(x => blocks.push({x, y: 280, width: 32, height: 32, type: 'question', hit: false}));
    
    // Enemies (Goombas)
    const enemyPositions = [450, 750, 1000, 1400, 1750, 2000, 2300, 2600];
    enemyPositions.forEach(x => enemies.push({x, y: 368, width: 32, height: 32, vx: -1.5, type: 'goomba', alive: true}));
    
    // Coins
    const coinPositions = [350, 520, 720, 950, 1150, 1350, 1550, 1950, 2150, 2450];
    coinPositions.forEach((x, i) => coinObjects.push({x, y: 150 + (i%3)*40, width: 24, height: 24, collected: false}));
}

// Input handling
document.addEventListener('keydown', e => {
    if(e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
    if(e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
    if(e.key === ' ' || e.key === 'w' || e.key === 'W' || e.key === 'ArrowUp') {
        if(mario.grounded) { mario.vy = mario.jumpForce; mario.grounded = false; }
        keys.jump = true;
    }
});
document.addEventListener('keyup', e => {
    if(e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
    if(e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
    if(e.key === ' ' || e.key === 'w' || e.key === 'W' || e.key === 'ArrowUp') keys.jump = false;
});

// Particle system
class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.vx = (Math.random()-0.5)*6; this.vy = (Math.random()-0.5)*6;
        this.life = 1; this.size = Math.random()*4+2;
    }
    update() { this.x += this.vx; this.y += this.vy; this.vy += 0.2; this.life -= 0.03; this.size *= 0.95; }
    draw(ctx, camX) {
        ctx.globalAlpha = this.life; ctx.fillStyle = this.color;
        ctx.fillRect(this.x - camX, this.y, this.size, this.size); ctx.globalAlpha = 1;
    }
}

function createExplosion(x, y, color, count=10) {
    for(let i=0; i<count; i++) particles.push(new Particle(x, y, color));
}

// Collision detection
function rectCollide(a, b) {
    return a.x < b.x + b.width && a.x + a.width > b.x && a.y < b.y + b.height && a.y + a.height > b.y;
}

// Update game
function update() {
    if(gameState !== 'playing') return;
    
    // Mario movement
    if(keys.left) { mario.vx = -mario.speed; mario.facing = -1; }
    else if(keys.right) { mario.vx = mario.speed; mario.facing = 1; }
    else mario.vx *= friction;
    
    mario.vy += gravity;
    mario.x += mario.vx; mario.y += mario.vy;
    mario.grounded = false;
    
    // Platform collision
    platforms.forEach(p => {
        if(rectCollide(mario, p)) {
            if(mario.vy > 0 && mario.y + mario.height - mario.vy <= p.y) {
                mario.y = p.y - mario.height; mario.vy = 0; mario.grounded = true;
            } else if(mario.vy < 0 && mario.y - mario.vy >= p.y + p.height) {
                mario.y = p.y + p.height; mario.vy = 0;
            } else if(mario.vx > 0) mario.x = p.x - mario.width;
            else if(mario.vx < 0) mario.x = p.x + p.width;
        }
    });
    
    // Block collision
    blocks.forEach(b => {
        if(!b.hit && rectCollide(mario, b)) {
            if(mario.vy < 0 && mario.y - mario.vy >= b.y + b.height) {
                mario.y = b.y + b.height; mario.vy = 0;
                b.hit = true; score += 100; coins++; createExplosion(b.x+16, b.y, '#ffcc00', 8);
            }
        }
    });
    
    // Coin collection
    coinObjects.forEach(c => {
        if(!c.collected && rectCollide(mario, c)) {
            c.collected = true; score += 200; coins++; createExplosion(c.x+12, c.y+12, '#ffcc00', 5);
        }
    });
    
    // Enemy collision and AI
    enemies.forEach(e => {
        if(!e.alive) { e.x += e.vx; return; }
        e.x += e.vx;
        // Simple AI: reverse at edges or walls
        if(Math.random() < 0.02) e.vx *= -1;
        
        if(rectCollide(mario, e)) {
            if(mario.vy > 0 && mario.y + mario.height - mario.vy <= e.y + e.height/2) {
                // Stomp enemy
                e.alive = false; mario.vy = -8; score += 1000;
                createExplosion(e.x+16, e.y+16, '#8b4513', 12);
            } else if(!mario.invincible) {
                // Mario hit
                if(mario.big) { mario.big = false; mario.invincible = true; mario.invincibleTimer = 120; }
                else { loseLife(); }
            }
        }
    });
    
    // Invincibility timer
    if(mario.invincible) {
        mario.invincibleTimer--;
        if(mario.invincibleTimer <= 0) mario.invincible = false;
    }
    
    // Camera follow
    cameraX = Math.max(0, Math.min(mario.x - 300, levelLength - 800));
    
    // Check win (reach flag)
    if(mario.x >= flagX) {
        score += 5000;
        createExplosion(mario.x, mario.y - 50, '#ffcc00', 30);
        setTimeout(() => { alert('LEVEL COMPLETE! Score: ' + score); startGame(); }, 500);
    }
    
    // Fall death
    if(mario.y > 500) loseLife();
    
    // Update particles
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => p.update());
    
    // Update UI
    document.getElementById('score').textContent = String(score).padStart(4, '0');
    document.getElementById('coins').textContent = String(coins).padStart(2, '0');
    document.getElementById('lives').textContent = lives;
}

function loseLife() {
    lives--;
    if(lives <= 0) {
        gameState = 'gameover';
        document.getElementById('finalScore').textContent = score;
        document.getElementById('gameOverScreen').classList.remove('hidden');
    } else {
        mario.x = 100; mario.y = 300; mario.vx = 0; mario.vy = 0;
        cameraX = 0;
    }
}

// Draw game
function draw() {
    // Sky gradient
    const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
    gradient.addColorStop(0, '#5c94fc'); gradient.addColorStop(1, '#85b5ff');
    ctx.fillStyle = gradient; ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Parallax clouds
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    for(let i=0; i<10; i++) {
        let x = ((i*300 - cameraX*0.3) % 2400) + 400;
        let y = 60 + (i%3)*30;
        ctx.beginPath(); ctx.arc(x, y, 30, 0, Math.PI*2);
        ctx.arc(x+25, y-10, 35, 0, Math.PI*2);
        ctx.arc(x+50, y, 30, 0, Math.PI*2);
        ctx.fill();
    }
    
    // Parallax hills
    ctx.fillStyle = '#228B22';
    for(let i=0; i<15; i++) {
        let x = ((i*250 - cameraX*0.5) % 3750) + 600;
        ctx.beginPath();
        ctx.ellipse(x, 400, 100, 60, 0, Math.PI, 0);
        ctx.fill();
    }
    
    // Platforms
    platforms.forEach(p => {
        if(p.type === 'ground') {
            ctx.fillStyle = '#8b4513';
            ctx.fillRect(p.x - cameraX, p.y, p.width, p.height);
            ctx.fillStyle = '#228B22';
            ctx.fillRect(p.x - cameraX, p.y, p.width, 10);
        } else {
            ctx.fillStyle = '#CD853F';
            ctx.fillRect(p.x - cameraX, p.y, p.width, p.height);
            ctx.strokeStyle = '#8b4513'; ctx.lineWidth = 2;
            ctx.strokeRect(p.x - cameraX, p.y, p.width, p.height);
        }
    });
    
    // Question blocks
    blocks.forEach(b => {
        ctx.fillStyle = b.hit ? '#8b4513' : '#FFD700';
        ctx.fillRect(b.x - cameraX, b.y, b.width, b.height);
        ctx.strokeStyle = '#8b4513'; ctx.lineWidth = 2;
        ctx.strokeRect(b.x - cameraX, b.y, b.width, b.height);
        if(!b.hit) {
            ctx.fillStyle = '#000'; ctx.font = 'bold 24px Arial';
            ctx.fillText('?', b.x - cameraX + 10, b.y + 24);
        }
    });
    
    // Coins
    coinObjects.forEach(c => {
        if(!c.collected) {
            ctx.fillStyle = '#FFD700';
            ctx.beginPath(); ctx.ellipse(c.x - cameraX + 12, c.y + 12, 8, 12, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.strokeStyle = '#FFA500'; ctx.lineWidth = 2; ctx.stroke();
        }
    });
    
    // Enemies (Goombas)
    enemies.forEach(e => {
        if(e.alive) {
            ctx.fillStyle = '#8b4513';
            ctx.beginPath();
            ctx.arc(e.x - cameraX + 16, e.y + 16, 16, 0, Math.PI*2);
            ctx.fill();
            // Eyes
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(e.x - cameraX + 10, e.y + 12, 5, 0, Math.PI*2);
            ctx.arc(e.x - cameraX + 22, e.y + 12, 5, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath(); ctx.arc(e.x - cameraX + 10, e.y + 12, 2, 0, Math.PI*2);
            ctx.arc(e.x - cameraX + 22, e.y + 12, 2, 0, Math.PI*2);
            ctx.fill();
        }
    });
    
    // Flag pole
    ctx.fillStyle = '#228B22';
    ctx.fillRect(flagX - cameraX, 150, 8, 250);
    ctx.fillStyle = '#e52521';
    ctx.beginPath();
    ctx.moveTo(flagX - cameraX + 8, 150);
    ctx.lineTo(flagX - cameraX + 60, 175);
    ctx.lineTo(flagX - cameraX + 8, 200);
    ctx.fill();
    
    // Mario
    if(!mario.invincible || Math.floor(Date.now()/100) % 2 === 0) {
        ctx.save();
        ctx.translate(mario.x - cameraX + 16, mario.y + 16);
        ctx.scale(mario.facing, 1);
        
        // Body
        ctx.fillStyle = '#e52521';
        ctx.fillRect(-14, -14, 28, 14);
        // Overalls
        ctx.fillStyle = '#0000ff';
        ctx.fillRect(-12, 0, 24, 14);
        // Head
        ctx.fillStyle = '#ffcc99';
        ctx.fillRect(-10, -24, 20, 14);
        // Hat
        ctx.fillStyle = '#e52521';
        ctx.fillRect(-12, -28, 24, 8);
        ctx.fillRect(-12, -24, 18, 4);
        // Eyes
        ctx.fillStyle = '#000';
        ctx.fillRect(2, -20, 4, 6);
        // Mustache
        ctx.fillStyle = '#000';
        ctx.fillRect(4, -14, 10, 4);
        
        ctx.restore();
    }
    
    // Particles
    particles.forEach(p => p.draw(ctx, cameraX));
    
    requestAnimationFrame(draw);
}

function gameLoop() { update(); draw(); setTimeout(gameLoop, 1000/60); }

function startGame() {
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('gameOverScreen').classList.add('hidden');
    gameState = 'playing';
    score = 0; coins = 0; lives = 3;
    mario.x = 100; mario.y = 300; mario.vx = 0; mario.vy = 0; mario.big = false;
    generateLevel();
}

// Start
generateLevel();
gameLoop();
</script>
</body>
</html>
