<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Mario Platformer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(to bottom, #5c94fc 0%, #85b5ff 100%); overflow: hidden; font-family: 'Arial', sans-serif; touch-action: none; user-select: none; }
        #gameContainer { position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        canvas { border: 4px solid #000; border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.4); image-rendering: pixelated; }
        #ui { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 40px; color: #fff; font-size: 20px; font-weight: bold; text-shadow: 2px 2px 0 #000; z-index: 10; background: rgba(0,0,0,0.3); padding: 12px 24px; border-radius: 12px; }
        .ui-item { display: flex; flex-direction: column; align-items: center; min-width: 60px; }
        .ui-label { font-size: 11px; opacity: 0.9; letter-spacing: 1px; }
        .ui-value { font-size: 22px; color: #ffcc00; font-family: 'Courier New', monospace; }
        #startScreen, #gameOverScreen, #winScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); z-index: 20; }
        .screen-title { font-size: 56px; color: #e52521; text-shadow: 3px 3px 0 #fff, 6px 6px 0 #000; margin-bottom: 15px; letter-spacing: 4px; animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .screen-subtitle { color: #fff; font-size: 16px; line-height: 1.8; text-align: center; opacity: 0.9; margin-bottom: 25px; }
        .btn { background: linear-gradient(to bottom, #e52521, #b81c19); border: 3px solid #fff; color: #fff; padding: 16px 48px; font-size: 20px; font-weight: bold; border-radius: 12px; cursor: pointer; text-transform: uppercase; box-shadow: 0 6px 0 #8b0000, 0 10px 20px rgba(0,0,0,0.3); transition: all 0.1s; letter-spacing: 2px; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 9px 0 #8b0000, 0 13px 25px rgba(0,0,0,0.4); }
        .btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #8b0000; }
        .hidden { display: none !important; }
        #mobileControls { display: none; position: absolute; bottom: 30px; width: 100%; justify-content: space-between; padding: 0 50px; z-index: 15; }
        .dpad, .actions { display: flex; gap: 15px; }
        .mbtn { width: 70px; height: 70px; background: rgba(255,255,255,0.25); border: 3px solid #fff; border-radius: 50%; color: #fff; font-size: 28px; display: flex; align-items: center; justify-content: center; transition: all 0.1s; }
        .mbtn:active { background: rgba(255,255,255,0.5); transform: scale(0.9); }
        @media (max-width: 850px) { #mobileControls { display: flex; } #ui { gap: 20px; padding: 10px 16px; } .ui-value { font-size: 18px; } }
        #pauseOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 25; font-size: 32px; color: #fff; font-weight: bold; text-shadow: 2px 2px 0 #000; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="ui">
            <div class="ui-item"><span class="ui-label">SCORE</span><span class="ui-value" id="score">0000</span></div>
            <div class="ui-item"><span class="ui-label">COINS</span><span class="ui-value" id="coins">00</span></div>
            <div class="ui-item"><span class="ui-label">WORLD</span><span class="ui-value" id="world">1-1</span></div>
            <div class="ui-item"><span class="ui-label">LIVES</span><span class="ui-value" id="lives">3</span></div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="startScreen">
            <h1 class="screen-title">SUPER MARIO</h1>
            <p class="screen-subtitle">Arrow Keys / WASD to Move | Space / W to Jump | P to Pause<br>Collect coins, stomp enemies, reach the flag!</p>
            <button class="btn" onclick="startGame()">START GAME</button>
        </div>
        <div id="gameOverScreen" class="hidden">
            <h1 class="screen-title" style="color:#ff4444">GAME OVER</h1>
            <p class="screen-subtitle">Final Score: <span id="finalScore" style="color:#ffcc00;font-size:28px">0</span></p>
            <button class="btn" onclick="startGame()">TRY AGAIN</button>
        </div>
        <div id="winScreen" class="hidden">
            <h1 class="screen-title" style="color:#44ff44">LEVEL COMPLETE!</h1>
            <p class="screen-subtitle">Score: <span id="winScore" style="color:#ffcc00;font-size:28px">0</span></p>
            <button class="btn" onclick="startGame()">PLAY AGAIN</button>
        </div>
        <div id="pauseOverlay" class="hidden">PAUSED</div>
        <div id="mobileControls">
            <div class="dpad">
                <button class="mbtn" ontouchstart="keys.left=true" ontouchend="keys.left=false">◀</button>
                <button class="mbtn" ontouchstart="keys.right=true" ontouchend="keys.right=false">▶</button>
            </div>
            <div class="actions"><button class="mbtn" ontouchstart="keys.jump=true" ontouchend="keys.jump=false">A</button></div>
        </div>
    </div>
<script>
const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
canvas.width = 800; canvas.height = 450;

// Game state
let gameState = 'start', score = 0, coins = 0, lives = 3, time = 400, cameraX = 0, gameTime = 0;
let keys = {left:false, right:false, jump:false, jumpPressed:false};
let shakeMagnitude = 0, coyoteTimer = 0, jumpBufferTimer = 0, marioScaleX = 1, marioScaleY = 1;
let audioCtx, platforms = [], enemies = [], coinObjects = [], blocks = [], particles = [], powerups = [];
const levelLength = 3000, flagX = 2800;

const mario = {x:100, y:300, width:32, height:32, vx:0, vy:0, speed:5.5, maxSpeed:6, jumpForce:-13.5, grounded:false, facing:1, big:false, invincible:false, invincibleTimer:0};

function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }

function playSound(type) {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const osc = (f, t, d, v=0.15) => { const o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.frequency.setValueAtTime(f, now); o.type=t; g.gain.setValueAtTime(v, now); g.gain.exponentialRampToValueAtTime(0.01, now+d); o.start(now); o.stop(now+d); };
    if (type==='jump') { osc(150,'square',0.12); osc(200,'sine',0.1,0.08); }
    if (type==='coin') { osc(988,'sine',0.15); setTimeout(()=>osc(1319,'sine',0.2), 80); }
    if (type==='stomp') { osc(180,'sawtooth',0.15,0.2); osc(120,'square',0.1,0.1); }
    if (type==='powerup') { [440,554,698,880].forEach((f,i)=>setTimeout(()=>osc(f,'sine',0.15,0.12), i*70)); }
    if (type==='die') { osc(400,'sawtooth',0.2,0.2); setTimeout(()=>osc(300,'sawtooth',0.2,0.2), 150); setTimeout(()=>osc(200,'sawtooth',0.3,0.2), 300); }
    if (type==='win') { [523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>osc(f,'square',0.3,0.15), i*120)); }
    if (type==='bump') { osc(100,'square',0.08,0.15); }
    if (type==='break') { osc(80,'sawtooth',0.1,0.2); osc(60,'square',0.15,0.15); }
}

function generateLevel() {
    platforms.length=0; enemies.length=0; coinObjects.length=0; blocks.length=0; powerups.length=0; particles.length=0;
    for(let i=0; i<levelLength; i+=40) if(i<500||(i>600&&i<1000)||(i>1100&&i<1500)||i>1600) platforms.push({x:i,y:400,width:40,height:50,type:'ground'});
    [{x:350,y:280,w:100},{x:550,y:200,w:80},{x:800,y:260,w:120},{x:1100,y:180,w:100},{x:1400,y:280,w:80},{x:1700,y:200,w:150},{x:2100,y:240,w:100},{x:2400,y:180,w:120}].forEach(p=>platforms.push({x:p.x,y:p.y,width:p.w,height:24,type:'brick'}));
    [{x:400,y:260,c:'coin'}, {x:750,y:240,c:'mushroom'}, {x:1150,y:220,c:'coin'}, {x:1750,y:240,c:'star'}, {x:2450,y:220,c:'mushroom'}].forEach(b=>blocks.push({x:b.x,y:b.y,width:32,height:32,type:'question',hit:false,content:b.c}));
    [450,570,820,1120,1420,1720,2120,2420,2700].forEach(x=>coinObjects.push({x,y:160,width:24,height:24,collected:false}));
    [500,850,1200,1550,1900,2250,2600].forEach(x=>enemies.push({x,y:368,width:32,height:32,vx:-1.5,type:'goomba',alive:true}));
    [700,1400,2100].forEach(x=>enemies.push({x,y:368,width:32,height:32,vx:-1,type:'koopa',alive:true}));
}

function collide(a,b) { return a.x<b.x+b.width && a.x+a.width>b.x && a.y<b.y+b.height && a.y+a.height>b.y; }
function createExplosion(x,y,color,count=12) { for(let i=0;i<count;i++) particles.push({x,y,vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8,life:1,color,size:Math.random()*5+3}); }
function addShake(mag) { shakeMagnitude = Math.max(shakeMagnitude, mag); }

function doJump() {
    mario.vy = mario.jumpForce;
    mario.grounded = false;
    marioScaleX = 0.7; marioScaleY = 1.3;
    playSound('jump');
    createExplosion(mario.x+16, mario.y+32, 'rgba(255,255,255,0.5)', 8);
}

document.addEventListener('keydown', e => {
    if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') keys.left=true;
    if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') keys.right=true;
    if(e.key==='p'||e.key==='P') togglePause();
    if(e.key===' '||e.key==='w'||e.key==='W'||e.key==='ArrowUp') {
        keys.jump = true;
        keys.jumpPressed = true;
        jumpBufferTimer = 80;
        if (!audioCtx) initAudio();
    }
});
document.addEventListener('keyup', e => {
    if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') keys.left=false;
    if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') keys.right=false;
    if(e.key===' '||e.key==='w'||e.key==='W'||e.key==='ArrowUp') { keys.jump=false; keys.jumpPressed=false; }
});

function togglePause() {
    if (gameState === 'playing') { gameState = 'paused'; document.getElementById('pauseOverlay').classList.remove('hidden'); }
    else if (gameState === 'paused') { gameState = 'playing'; document.getElementById('pauseOverlay').classList.add('hidden'); }
}

class Particle {
    constructor(x,y,color) { this.x=x; this.y=y; this.color=color; this.vx=(Math.random()-0.5)*8; this.vy=(Math.random()-0.5)*8; this.life=1; this.size=Math.random()*5+3; }
    update() { this.x+=this.vx; this.y+=this.vy; this.vy+=0.3; this.life-=0.025; this.size*=0.96; }
    draw(camX) { ctx.globalAlpha=this.life; ctx.fillStyle=this.color; ctx.fillRect(this.x-camX,this.y,this.size,this.size); ctx.globalAlpha=1; }
}

function update() {
    if (gameState !== 'playing') return;
    gameTime++;
    if (jumpBufferTimer > 0) jumpBufferTimer--;
    if (coyoteTimer > 0) coyoteTimer--;
    
    // Input with acceleration
    const targetVx = (keys.left ? -1 : keys.right ? 1 : 0) * mario.maxSpeed;
    mario.vx += (targetVx - mario.vx) * mario.speed * 0.15;
    if (!keys.left && !keys.right) mario.vx *= 0.82;
    
    mario.vy += 0.6;
    mario.x += mario.vx; mario.y += mario.vy;
    
    // Platform collision
    let wasGrounded = mario.grounded;
    mario.grounded = false;
    platforms.forEach(p => {
        if (collide(mario, p)) {
            if (mario.vy > 0 && mario.y + mario.height - mario.vy <= p.y) {
                mario.y = p.y - mario.height; mario.vy = 0; mario.grounded = true;
                if (!wasGrounded && mario.vy > 5) { marioScaleX=1.3; marioScaleY=0.7; setTimeout(()=>{marioScaleX=1;marioScaleY=1;},100); }
            } else if (mario.vy < 0 && mario.y - mario.vy >= p.y + p.height) {
                mario.y = p.y + p.height; mario.vy = 0; playSound('bump');
            } else if (mario.vx > 0) mario.x = p.x - mario.width;
            else if (mario.vx < 0) mario.x = p.x + p.width;
        }
    });
    
    // Coyote time
    if (wasGrounded && !mario.grounded) coyoteTimer = 100;
    
    // Jump with buffer
    if (jumpBufferTimer > 0 && (mario.grounded || coyoteTimer > 0)) { doJump(); jumpBufferTimer = 0; }
    
    // Block collision
    blocks.forEach(b => {
        if (!b.hit && collide(mario, b)) {
            if (mario.vy < 0 && mario.y - mario.vy >= b.y + b.height) {
                mario.y = b.y + b.height; mario.vy = 0; b.hit = true;
                addShake(3); playSound('bump'); createExplosion(b.x+16, b.y, '#ffd700', 10);
                if (b.content === 'coin') { score += 200; coins++; playSound('coin'); }
                if (b.content === 'mushroom') { mario.big = true; score += 1000; playSound('powerup'); marioScaleX=1.5; marioScaleY=1.5; }
                if (b.content === 'star') { mario.invincible = true; mario.invincibleTimer = 600; score += 2000; playSound('powerup'); }
            }
        }
    });
    
    // Coin collection
    coinObjects.forEach(c => {
        if (!c.collected && collide(mario, c)) { c.collected = true; score += 200; coins++; playSound('coin'); createExplosion(c.x+12, c.y+12, '#ffd700', 8); }
    });
    
    // Enemy collision
    enemies.forEach(e => {
        if (!e.alive) return;
        e.x += e.vx;
        if (Math.random() < 0.02) e.vx *= -1;
        if (collide(mario, e)) {
            if (mario.vy > 0 && mario.y + mario.height - mario.vy <= e.y + e.height/2) {
                e.alive = false; mario.vy = -9; score += 1000; addShake(5); playSound('stomp'); createExplosion(e.x+16, e.y+16, '#8b4513', 15);
            } else if (!mario.invincible) {
                if (mario.big) { mario.big = false; mario.invincible = true; mario.invincibleTimer = 120; marioScaleX=1; marioScaleY=1; addShake(8); playSound('die'); }
                else { loseLife(); }
            }
        }
    });
    
    // Invincibility
    if (mario.invincible) { mario.invincibleTimer--; if (mario.invincibleTimer <= 0) mario.invincible = false; }
    
    // Camera follow with smoothing
    const targetCamX = Math.max(0, Math.min(mario.x - 300, levelLength - 800));
    cameraX += (targetCamX - cameraX) * 0.1;
    
    // Screen shake decay
    shakeMagnitude *= shakeDecay;
    if (shakeMagnitude < 0.5) shakeMagnitude = 0;
    
    // Mario scale recovery
    marioScaleX += (1 - marioScaleX) * 0.15;
    marioScaleY += (1 - marioScaleY) * 0.15;
    
    // Win condition
    if (mario.x >= flagX) {
        score += 5000; playSound('win'); addShake(10);
        createExplosion(mario.x, mario.y-50, '#ffd700', 40);
        gameState = 'win';
        document.getElementById('winScore').textContent = score;
        document.getElementById('winScreen').classList.remove('hidden');
        return;
    }
    
    // Fall death
    if (mario.y > 500) loseLife();
    
    // Particles
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => p.update());
    
    // UI update
    document.getElementById('score').textContent = String(score).padStart(4,'0');
    document.getElementById('coins').textContent = String(coins).padStart(2,'0');
    document.getElementById('lives').textContent = lives;
}

function loseLife() {
    lives--; playSound('die'); addShake(15); createExplosion(mario.x+16, mario.y+16, '#ff0000', 20);
    if (lives <= 0) { gameState = 'gameover'; document.getElementById('finalScore').textContent = score; document.getElementById('gameOverScreen').classList.remove('hidden'); }
    else { mario.x = 100; mario.y = 300; mario.vx = 0; mario.vy = 0; cameraX = 0; mario.big = false; mario.invincible = false; marioScaleX = 1; marioScaleY = 1; }
}

function draw() {
    // Sky
    const grad = ctx.createLinearGradient(0,0,0,canvas.height);
    grad.addColorStop(0,'#5c94fc'); grad.addColorStop(1,'#85b5ff');
    ctx.fillStyle = grad; ctx.fillRect(0,0,canvas.width,canvas.height);
    
    // Screen shake
    ctx.save();
    if (shakeMagnitude > 0) {
        const dx = (Math.random()-0.5) * shakeMagnitude * 2;
        const dy = (Math.random()-0.5) * shakeMagnitude * 2;
        ctx.translate(dx, dy);
    }
    
    // Parallax clouds
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    for(let i=0;i<10;i++) {
        const x = ((i*300 - cameraX*0.3) % 2400) + 400, y = 60 + (i%3)*30;
        ctx.beginPath(); ctx.arc(x,y,30,0,Math.PI*2); ctx.arc(x+25,y-10,35,0,Math.PI*2); ctx.arc(x+50,y,30,0,Math.PI*2); ctx.fill();
    }
    
    // Parallax hills
    ctx.fillStyle = '#228B22';
    for(let i=0;i<15;i++) {
        const x = ((i*250 - cameraX*0.5) % 3750) + 600;
        ctx.beginPath(); ctx.ellipse(x,400,100,60,0,Math.PI,0); ctx.fill();
    }
    
    // Platforms
    platforms.forEach(p => {
        if (p.type === 'ground') {
            ctx.fillStyle = '#8b4513'; ctx.fillRect(p.x-cameraX, p.y, p.width, p.height);
            ctx.fillStyle = '#228B22'; ctx.fillRect(p.x-cameraX, p.y, p.width, 10);
        } else {
            ctx.fillStyle = '#CD853F'; ctx.fillRect(p.x-cameraX, p.y, p.width, p.height);
            ctx.strokeStyle = '#8b4513'; ctx.lineWidth = 2; ctx.strokeRect(p.x-cameraX, p.y, p.width, p.height);
        }
    });
    
    // Blocks
    blocks.forEach(b => {
        ctx.fillStyle = b.hit ? '#8b4513' : '#FFD700';
        ctx.fillRect(b.x-cameraX, b.y, b.width, b.height);
        ctx.strokeStyle = '#8b4513'; ctx.lineWidth = 2; ctx.strokeRect(b.x-cameraX, b.y, b.width, b.height);
        if (!b.hit) { ctx.fillStyle = '#000'; ctx.font = 'bold 24px Arial'; ctx.fillText('?', b.x-cameraX+10, b.y+24); }
    });
    
    // Coins
    coinObjects.forEach(c => {
        if (!c.collected) {
            ctx.fillStyle = '#FFD700'; ctx.beginPath();
            const wobble = Math.sin(gameTime * 0.1 + c.x) * 2;
            ctx.ellipse(c.x-cameraX+12, c.y+12+wobble, 8, 10, 0, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#FFA500'; ctx.lineWidth = 2; ctx.stroke();
        }
    });
    
    // Enemies
    enemies.forEach(e => {
        if (!e.alive) return;
        ctx.fillStyle = '#8b4513';
        ctx.beginPath(); ctx.arc(e.x-cameraX+16, e.y+16, 16, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(e.x-cameraX+10, e.y+12, 5, 0, Math.PI*2); ctx.arc(e.x-cameraX+22, e.y+12, 5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(e.x-cameraX+10, e.y+12, 2, 0, Math.PI*2); ctx.arc(e.x-cameraX+22, e.y+12, 2, 0, Math.PI*2); ctx.fill();
    });
    
    // Flag
    ctx.fillStyle = '#228B22'; ctx.fillRect(flagX-cameraX, 150, 8, 250);
    ctx.fillStyle = '#e52521'; ctx.beginPath();
    ctx.moveTo(flagX-cameraX+8, 150); ctx.lineTo(flagX-cameraX+60, 175); ctx.lineTo(flagX-cameraX+8, 200); ctx.fill();
    
    // Mario
    if (!mario.invincible || Math.floor(gameTime/4) % 2 === 0) {
        ctx.save();
        ctx.translate(mario.x - cameraX + 16, mario.y + 16);
        ctx.scale(marioScaleX * mario.facing, marioScaleY);
        ctx.fillStyle = '#e52521'; ctx.fillRect(-14, -14, 28, 14);
        ctx.fillStyle = '#0000ff'; ctx.fillRect(-12, 0, 24, 14);
        ctx.fillStyle = '#ffcc99'; ctx.fillRect(-10, -24, 20, 14);
        ctx.fillStyle = '#e52521'; ctx.fillRect(-12, -28, 24, 8); ctx.fillRect(-12, -24, 18, 4);
        ctx.fillStyle = '#000'; ctx.fillRect(2, -20, 4, 6); ctx.fillRect(4, -14, 10, 4);
        ctx.restore();
    }
    
    // Particles
    particles.forEach(p => p.draw(cameraX));
    
    ctx.restore();
    requestAnimationFrame(draw);
}

function gameLoop() {
    const now = performance.now();
    if (now - lastTime >= 16.67) { update(); lastTime = now; }
    draw();
    requestAnimationFrame(gameLoop);
}

function startGame() {
    initAudio();
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('gameOverScreen').classList.add('hidden');
    document.getElementById('winScreen').classList.add('hidden');
    document.getElementById('pauseOverlay').classList.add('hidden');
    gameState = 'playing'; score = 0; coins = 0; lives = 3; time = 400;
    mario.x = 100; mario.y = 300; mario.vx = 0; mario.vy = 0; mario.big = false; mario.invincible = false; marioScaleX = 1; marioScaleY = 1;
    cameraX = 0; shakeMagnitude = 0;
    generateLevel();
}

// Init
generateLevel();
gameLoop();
</script>
</body>
</html>
